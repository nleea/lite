# SonarQube – configuración del monorepo `lite`.
# Ejecutar desde la raíz con: make sonar  (o sonar-scanner)

sonar.projectKey=lite
sonar.projectName=Lite - Inventory + AI Agent
sonar.projectVersion=0.1

# --- Código fuente por lenguaje/paquete ---
# Sonar detecta Python y TS/JS automáticamente dentro de estas rutas.
sonar.sources=domain,backend,services/app,frontend
sonar.tests=domain,backend,services

# Sólo tomamos como "test code" los archivos de test reales.
sonar.test.inclusions=**/test_*.py,**/*_test.py,**/tests/**

# --- Exclusiones (no penalizar código generado / vendor) ---
sonar.exclusions=**/migrations/**,**/__pycache__/**,**/.venv/**,frontend/.next/**,frontend/node_modules/**,**/*.sol,**/artifacts/**

# --- Cobertura ---
# Un coverage.xml (formato Cobertura) por paquete Python.
sonar.python.coverage.reportPaths=domain/coverage.xml,backend/coverage.xml,services/coverage.xml
# Cuando el frontend tenga vitest/jest, añadir:
# sonar.javascript.lcov.reportPaths=frontend/coverage/lcov.info

sonar.python.version=3.11
sonar.sourceEncoding=UTF-8
